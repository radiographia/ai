<script type="module" src="player.js"></script>
  <style>
    /* ============================================
       CSS ПЕРЕМЕННЫЕ — ЦВЕТОВАЯ СХЕМА
       ============================================ */
    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252540;
      --bg-hover: #2a2a45;
      --bg-active: #353560;
      --accent-primary: #4da6ff;
      --accent-secondary: #3a7bd5;
      --accent-glow: rgba(77, 166, 255, 0.3);
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #6a6a7a;
      --border-color: #333;
      --border-light: #444;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --shadow-glow: rgba(77, 166, 255, 0.15);
      
      /* Размеры */
      --border-radius: 8px;
      --border-radius-sm: 4px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      
      /* Анимации */
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 350ms ease;
    }

    /* ============================================
       СБРОС И БАЗОВЫЕ СТИЛИ
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
                   'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--spacing-md);
      overflow-x: hidden;
    }

    /* ============================================
       CANVAS КОНТЕЙНЕР
       ============================================ */
    .canvas-container {
      position: relative;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      box-shadow: 
        0 4px 20px var(--shadow-color),
        0 0 40px var(--shadow-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
      max-width: 100%;
      transition: box-shadow var(--transition-normal);
    }

    .canvas-container:hover {
      box-shadow: 
        0 6px 30px var(--shadow-color),
        0 0 60px var(--shadow-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    #canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 800px;
      background: #000;
    }

    /* ============================================
       КНОПКА МЕНЮ
       ============================================ */
#menuButton {
  position: absolute;
  top: var(--spacing-md);
  left: var(--spacing-md);
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-secondary);
  background: rgba(26, 26, 46, 0.35);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  cursor: pointer;
  transition: all var(--transition-fast);
  user-select: none;
  z-index: 100;
}

#menuButton:hover {
  color: var(--text-primary);
  background: rgba(26, 26, 46, 0.55);
  border-color: var(--accent-primary);
  box-shadow: 0 0 15px var(--accent-glow);
  transform: scale(1.05);
}

    #menuButton:active {
      transform: scale(0.95);
      background: var(--bg-active);
    }

    /* ============================================
       ВЫПАДАЮЩЕЕ МЕНЮ
       ============================================ */
    #dropdownMenu {
      position: absolute;
      top: calc(var(--spacing-md) + 50px);
      left: var(--spacing-md);
      min-width: 280px;
      max-height: 400px;
      overflow-y: auto;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      box-shadow: 
        0 8px 32px var(--shadow-color),
        0 0 20px rgba(77, 166, 255, 0.08);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px) scale(0.95);
      transition: all var(--transition-normal);
      z-index: 150;
    }

    #dropdownMenu.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .menuItem {
      padding: var(--spacing-sm) var(--spacing-md);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition-fast);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .menuItem:last-child {
      border-bottom: none;
    }

    .menuItem:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      padding-left: calc(var(--spacing-md) + 4px);
    }

    .menuItem:active {
      background: var(--bg-active);
      color: var(--accent-primary);
    }

    .menuItem.active {
      background: rgba(77, 166, 255, 0.1);
      color: var(--accent-primary);
      border-left: 3px solid var(--accent-primary);
    }

    .timecode {
      color: var(--text-muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      min-width: 50px;
    }

    .description {
      color: var(--text-primary);
      flex: 1;
    }

    /* Кастомный скроллбар для меню */
    #dropdownMenu::-webkit-scrollbar {
      width: 6px;
    }

    #dropdownMenu::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    #dropdownMenu::-webkit-scrollbar-thumb {
      background: var(--accent-secondary);
      border-radius: 3px;
    }

    #dropdownMenu::-webkit-scrollbar-thumb:hover {
      background: var(--accent-primary);
    }

    /* ============================================
       ПАНЕЛЬ ИНФОРМАЦИИ
       ============================================ */
    .info {
      margin-top: var(--spacing-md);
      padding: var(--spacing-sm) var(--spacing-md);
      background: rgba(26, 26, 46, 0.6);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .info span {
      color: var(--accent-primary);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 50px;
      text-align: center;
    }

    /* ============================================
       ПАНЕЛЬ УПРАВЛЕНИЯ
       ============================================ */
    .controls {
      margin-top: var(--spacing-md);
      display: flex;
      gap: var(--spacing-md);
      justify-content: center;
      flex-wrap: wrap;
    }

    .controls button {
      padding: var(--spacing-sm) var(--spacing-lg);
      min-width: 140px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-primary);
      background: linear-gradient(180deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      box-shadow: 
        0 2px 8px var(--shadow-color),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .controls button:hover {
      background: linear-gradient(180deg, var(--bg-active) 0%, var(--bg-tertiary) 100%);
      border-color: var(--accent-primary);
      box-shadow: 
        0 4px 16px var(--shadow-color),
        0 0 20px var(--accent-glow);
      transform: translateY(-2px);
    }

    .controls button:active {
      transform: translateY(0);
      background: var(--bg-active);
      box-shadow: 
        0 1px 4px var(--shadow-color),
        inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .controls button:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 
        0 0 0 3px var(--accent-glow),
        0 4px 16px var(--shadow-color);
    }

    /* ============================================
       АДАПТИВНОСТЬ — МЕДИА-ЗАПРОСЫ
       ============================================ */
    
    /* Tablet (768px - 1200px) */
    @media (max-width: 1200px) {
      :root {
        --spacing-md: 12px;
        --spacing-lg: 20px;
      }
      
      #canvas {
        max-width: 700px;
      }
      
      .controls button {
        min-width: 120px;
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 13px;
      }
    }

    /* Mobile (< 768px) */
    @media (max-width: 768px) {
      body {
        padding: var(--spacing-sm);
        justify-content: flex-start;
        padding-top: var(--spacing-lg);
      }
      
      #canvas {
        max-width: 100%;
      }
      
      #menuButton {
        width: 40px;
        height: 40px;
        font-size: 20px;
        top: var(--spacing-sm);
        left: var(--spacing-sm);
      }
      
      #dropdownMenu {
        left: var(--spacing-sm);
        right: var(--spacing-sm);
        min-width: auto;
        max-height: 250px;
      }
      
      .info {
        font-size: 13px;
        width: 100%;
        justify-content: center;
      }
      
      .controls {
        width: 100%;
      }
      
      .controls button {
        flex: 1;
        min-width: auto;
        max-width: 200px;
      }
    }

    /* Маленькие экраны (< 480px) */
    @media (max-width: 480px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
        gap: var(--spacing-sm);
      }
      
      .controls button {
        max-width: none;
        width: 100%;
      }
    }

    /* Высокая плотность пикселей (Retina) */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .canvas-container {
        border-width: 0.5px;
      }
      
      #menuButton,
      .controls button,
      .info {
        border-width: 0.5px;
      }
    }

    /* Предпочтение уменьшенного движения */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================
       ДОПОЛНИТЕЛЬНЫЕ УТИЛИТЫ
       ============================================ */
    
    /* Состояние загрузки */
    .canvas-container.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Подсветка при фокусе на канвасе */
    .canvas-container:focus-within {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }

    /* === КОНЕЦ СТИЛЕЙ === */
  </style>
</head>
<body>
  <div class="canvas-container">
    <canvas id="canvas" width="800" height="600"></canvas>
    
    <!-- Кнопка меню -->
    <div id="menuButton">☰</div>
    
    <!-- Выпадающее меню -->
    <div id="dropdownMenu"></div>
  </div>
  
  <div class="info">
    Кадр: <span id="frameDisplay">0</span>
  </div>

  <div class="controls">
    <button id="btnBack">◀ Назад</button>
    <button id="btnForward">Вперед ▶</button>
  </div>
