<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видео кейс — Радиологический просмотрщик</title>
  <style>
    /* ============================================
       CSS ПЕРЕМЕННЫЕ — ЦВЕТОВАЯ СХЕМА
       ============================================ */
    :host {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #252540;
      --bg-hover: #2a2a45;
      --bg-active: #353560;
      --accent-primary: #4da6ff;
      --accent-secondary: #3a7bd5;
      --accent-glow: rgba(77, 166, 255, 0.3);
      --text-primary: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #6a6a7a;
      --border-color: #333;
      --border-light: #444;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --shadow-glow: rgba(77, 166, 255, 0.15);
      
      /* Размеры */
      --border-radius: 8px;
      --border-radius-sm: 4px;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      
      /* Анимации */
      --transition-fast: 150ms ease;
      --transition-normal: 250ms ease;
      --transition-slow: 350ms ease;
    }

    /* ============================================
       СБРОС И БАЗОВЫЕ СТИЛИ
       ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :host {
      height: 100%;
    }

    :host {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
                   'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(145deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--spacing-md);
      overflow-x: hidden;
    }

    /* ============================================
       CANVAS КОНТЕЙНЕР
       ============================================ */
    .canvas-container {
      position: relative;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      box-shadow: 
        0 4px 20px var(--shadow-color),
        0 0 40px var(--shadow-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
      max-width: 100%;
      transition: box-shadow var(--transition-normal);
    }

    .canvas-container:hover {
      box-shadow: 
        0 6px 30px var(--shadow-color),
        0 0 60px var(--shadow-glow),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    #canvas {
      display: block;
      width: 100%;
      height: auto;
      max-width: 800px;
      background: #000;
    }

    /* ============================================
       КНОПКА МЕНЮ
       ============================================ */
#menuButton {
  position: absolute;
  top: var(--spacing-md);
  left: var(--spacing-md);
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-secondary);
  background: rgba(26, 26, 46, 0.35);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  cursor: pointer;
  transition: all var(--transition-fast);
  user-select: none;
  z-index: 100;
}

#menuButton:hover {
  color: var(--text-primary);
  background: rgba(26, 26, 46, 0.55);
  border-color: var(--accent-primary);
  box-shadow: 0 0 15px var(--accent-glow);
  transform: scale(1.05);
}

    #menuButton:active {
      transform: scale(0.95);
      background: var(--bg-active);
    }

    /* ============================================
       ВЫПАДАЮЩЕЕ МЕНЮ
       ============================================ */
    #dropdownMenu {
      position: absolute;
      top: calc(var(--spacing-md) + 50px);
      left: var(--spacing-md);
      min-width: 280px;
      max-height: 400px;
      overflow-y: auto;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      box-shadow: 
        0 8px 32px var(--shadow-color),
        0 0 20px rgba(77, 166, 255, 0.08);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px) scale(0.95);
      transition: all var(--transition-normal);
      z-index: 150;
    }

    #dropdownMenu.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    .menuItem {
      padding: var(--spacing-sm) var(--spacing-md);
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition-fast);
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
    }

    .menuItem:last-child {
      border-bottom: none;
    }

    .menuItem:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      padding-left: calc(var(--spacing-md) + 4px);
    }

    .menuItem:active {
      background: var(--bg-active);
      color: var(--accent-primary);
    }

    .menuItem.active {
      background: rgba(77, 166, 255, 0.1);
      color: var(--accent-primary);
      border-left: 3px solid var(--accent-primary);
    }

    .timecode {
      color: var(--text-muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      min-width: 50px;
    }

    .description {
      color: var(--text-primary);
      flex: 1;
    }

    /* Кастомный скроллбар для меню */
    #dropdownMenu::-webkit-scrollbar {
      width: 6px;
    }

    #dropdownMenu::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    #dropdownMenu::-webkit-scrollbar-thumb {
      background: var(--accent-secondary);
      border-radius: 3px;
    }

    #dropdownMenu::-webkit-scrollbar-thumb:hover {
      background: var(--accent-primary);
    }

    /* ============================================
       ПАНЕЛЬ ИНФОРМАЦИИ
       ============================================ */
    .info {
      margin-top: var(--spacing-md);
      padding: var(--spacing-sm) var(--spacing-md);
      background: rgba(26, 26, 46, 0.6);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: var(--spacing-xs);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .info span {
      color: var(--accent-primary);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 50px;
      text-align: center;
    }

    /* ============================================
       ПАНЕЛЬ УПРАВЛЕНИЯ
       ============================================ */
    .controls {
      margin-top: var(--spacing-md);
      display: flex;
      gap: var(--spacing-md);
      justify-content: center;
      flex-wrap: wrap;
    }

    .controls button {
      padding: var(--spacing-sm) var(--spacing-lg);
      min-width: 140px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text-primary);
      background: linear-gradient(180deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-sm);
      box-shadow: 
        0 2px 8px var(--shadow-color),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .controls button:hover {
      background: linear-gradient(180deg, var(--bg-active) 0%, var(--bg-tertiary) 100%);
      border-color: var(--accent-primary);
      box-shadow: 
        0 4px 16px var(--shadow-color),
        0 0 20px var(--accent-glow);
      transform: translateY(-2px);
    }

    .controls button:active {
      transform: translateY(0);
      background: var(--bg-active);
      box-shadow: 
        0 1px 4px var(--shadow-color),
        inset 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .controls button:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 
        0 0 0 3px var(--accent-glow),
        0 4px 16px var(--shadow-color);
    }

    /* ============================================
       АДАПТИВНОСТЬ — МЕДИА-ЗАПРОСЫ
       ============================================ */
    
    /* Tablet (768px - 1200px) */
    @media (max-width: 1200px) {
      :host {
        --spacing-md: 12px;
        --spacing-lg: 20px;
      }
      
      #canvas {
        max-width: 700px;
      }
      
      .controls button {
        min-width: 120px;
        padding: var(--spacing-sm) var(--spacing-md);
        font-size: 13px;
      }
    }

    /* Mobile (< 768px) */
    @media (max-width: 768px) {
      :host {
        padding: var(--spacing-sm);
        justify-content: flex-start;
        padding-top: var(--spacing-lg);
      }
      
      #canvas {
        max-width: 100%;
      }
      
      #menuButton {
        width: 40px;
        height: 40px;
        font-size: 20px;
        top: var(--spacing-sm);
        left: var(--spacing-sm);
      }
      
      #dropdownMenu {
        left: var(--spacing-sm);
        right: var(--spacing-sm);
        min-width: auto;
        max-height: 250px;
      }
      
      .info {
        font-size: 13px;
        width: 100%;
        justify-content: center;
      }
      
      .controls {
        width: 100%;
      }
      
      .controls button {
        flex: 1;
        min-width: auto;
        max-width: 200px;
      }
    }

    /* Маленькие экраны (< 480px) */
    @media (max-width: 480px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
        gap: var(--spacing-sm);
      }
      
      .controls button {
        max-width: none;
        width: 100%;
      }
    }

    /* Высокая плотность пикселей (Retina) */
    @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
      .canvas-container {
        border-width: 0.5px;
      }
      
      #menuButton,
      .controls button,
      .info {
        border-width: 0.5px;
      }
    }

    /* Предпочтение уменьшенного движения */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ============================================
       ДОПОЛНИТЕЛЬНЫЕ УТИЛИТЫ
       ============================================ */
    
    /* Состояние загрузки */
    .canvas-container.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border: 3px solid var(--border-color);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Подсветка при фокусе на канвасе */
    .canvas-container:focus-within {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }

    /* === КОНЕЦ СТИЛЕЙ === */
  </style>
</head>
<body>
  <div class="canvas-container">
    <canvas id="canvas" width="800" height="600"></canvas>
    
    <!-- Кнопка меню -->
    <div id="menuButton">☰</div>
    
    <!-- Выпадающее меню -->
    <div id="dropdownMenu"></div>
  </div>
  
  <div class="info">
    Кадр: <span id="frameDisplay">0</span>
  </div>

  <div class="controls">
    <button id="btnBack">◀ Назад</button>
    <button id="btnForward">Вперед ▶</button>
  </div>

<script>
(function () {
  // ── Используем переданные из article-section.js переменные, если есть ──
  let root = window.__playerRoot || null;
  let host = window.__playerHost || null;

  // Если не переданы – ищем <article-section> в основном документе
  if (!root) {
    const section = document.querySelector('article-section');
    if (section && section.shadowRoot) {
      root = section.shadowRoot;
      host = section;
    }
  }

  // Если всё равно нет – fallback на document (вызовет ошибку, но мы обработаем)
  if (!root) {
    root = document;
  }

  // ── Базовый путь к ресурсам ──────────────────────────────────────────
  let basePath = './';
  if (host && host.getAttribute('src')) {
    basePath = '/ai/' + host.getAttribute('src').replace(/[^/]+$/, '');
  }

  // ── Очистка предыдущих обработчиков ──────────────────────────────────
  if (host && host.__playerAbort) {
    host.__playerAbort.abort();
  }
  const abortController = new AbortController();
  if (host) host.__playerAbort = abortController;
  const { signal } = abortController;

  // ── Получаем элементы через root ────────────────────────────────────
  const canvas = root.querySelector('#canvas');
  if (!canvas) {
    console.error('Canvas не найден!');
    return;
  }
  const ctx = canvas.getContext('2d');
  const btnBack = root.querySelector('#btnBack');
  const btnForward = root.querySelector('#btnForward');
  const frameDisplay = root.querySelector('#frameDisplay');
  const menuButton = root.querySelector('#menuButton');
  const dropdownMenu = root.querySelector('#dropdownMenu');

  // ── Всё остальное – без изменений ──────────────────────────────────
  const video = document.createElement('video');
  video.src = basePath + 'video.mp4';
  video.preload = 'auto';
  video.muted = true;

  let currentFrame = 0;
  let totalFrames = 0;
  const FPS = 1;
  const frameDuration = 1 / FPS;
  let bookmarks = [];

  const scrollbar = {
    width: 20,
    padding: 10,
    thumbHeight: 30,
    isDragging: false,
    startY: 0,
    thumbY: 0,
    hover: false
  };

  async function loadBookmarks() {
    try {
      const response = await fetch(basePath + 'video.txt');
      if (!response.ok) {
        console.warn('Файл тайм-якорей не найден');
        return;
      }
      const text = await response.text();
      parseBookmarks(text);
    } catch (error) {
      console.warn('Ошибка загрузки тайм-якорей:', error);
    }
  }

  function parseBookmarks(text) {
    const lines = text.split('\n');
    bookmarks = lines
      .map(line => line.trim())
      .filter(line => line)
      .map(line => {
        const match = line.match(/^(\d{2}):(\d{2})\s*-\s*(.+)$/);
        if (match) {
          const minutes = parseInt(match[1]);
          const seconds = parseInt(match[2]);
          const timeInSeconds = minutes * 60 + seconds;
          const description = match[3].trim();
          return { time: timeInSeconds, frame: timeInSeconds * FPS, description };
        }
        return null;
      })
      .filter(item => item !== null);
    renderBookmarkMenu();
  }

  function renderBookmarkMenu() {
    dropdownMenu.innerHTML = '';
    bookmarks.forEach((bookmark, index) => {
      const menuItem = document.createElement('div');
      menuItem.className = 'menuItem';
      menuItem.dataset.index = index;
      menuItem.innerHTML = `
        <span class="timecode">${formatTime(bookmark.time)}</span>
        <span class="description">${bookmark.description}</span>
      `;
      menuItem.addEventListener('click', () => {
        goToFrame(bookmark.frame);
        closeMenu();
      });
      dropdownMenu.appendChild(menuItem);
    });
    if (bookmarks.length === 0) {
      const emptyItem = document.createElement('div');
      emptyItem.className = 'menuItem';
      emptyItem.textContent = 'Нет тайм-якорей';
      emptyItem.style.color = '#888';
      emptyItem.style.cursor = 'default';
      dropdownMenu.appendChild(emptyItem);
    }
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
  }

  function updateActiveBookmark() {
    const menuItems = dropdownMenu.querySelectorAll('.menuItem');
    menuItems.forEach(item => item.classList.remove('active'));
    let activeIndex = -1;
    for (let i = 0; i < bookmarks.length; i++) {
      if (currentFrame >= bookmarks[i].frame) activeIndex = i;
      else break;
    }
    if (activeIndex >= 0 && menuItems[activeIndex]) {
      menuItems[activeIndex].classList.add('active');
    }
  }

  function toggleMenu() { dropdownMenu.classList.toggle('show'); }
  function closeMenu() { dropdownMenu.classList.remove('show'); }

  video.addEventListener('loadedmetadata', () => {
    totalFrames = Math.floor(video.duration * FPS);
    const videoWidth = video.videoWidth;
    const videoHeight = video.videoHeight;
    canvas.width = videoWidth + scrollbar.width + scrollbar.padding * 2;
    canvas.height = videoHeight;
    goToFrame(0);
    loadBookmarks();
  });

  function goToFrame(frameNumber) {
    if (frameNumber < 0) frameNumber = 0;
    if (video.duration && frameNumber >= totalFrames) {
      frameNumber = totalFrames - 1;
    }
    video.currentTime = frameNumber * frameDuration;
    video.addEventListener('seeked', () => {
      if (video.readyState >= 2) {
        drawFrame();
        currentFrame = frameNumber;
        frameDisplay.textContent = currentFrame + 1;
        updateActiveBookmark();
      }
    }, { once: true });
  }

  function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const videoWidth = canvas.width - scrollbar.width - scrollbar.padding * 2;
    ctx.drawImage(video, 0, 0, videoWidth, canvas.height);
    drawScrollbar();
  }

  function drawScrollbar() {
    const videoWidth = canvas.width - scrollbar.width - scrollbar.padding * 2;
    const x = videoWidth + scrollbar.padding;
    const y = scrollbar.padding;
    const height = canvas.height - scrollbar.padding * 2;
    ctx.fillStyle = scrollbar.hover ? '#3a3a3a' : '#2a2a2a';
    ctx.fillRect(x, y, scrollbar.width, height);
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, scrollbar.width, height);
    if (totalFrames > 0) {
      const usableHeight = height - scrollbar.thumbHeight;
      scrollbar.thumbY = (currentFrame / (totalFrames - 1)) * usableHeight;
      ctx.fillStyle = scrollbar.isDragging ? '#3a7bd5' : '#4da6ff';
      ctx.fillRect(x + 2, y + scrollbar.thumbY, scrollbar.width - 4, scrollbar.thumbHeight);
      ctx.fillStyle = '#2a2a40';
      ctx.fillRect(x + 2, y + scrollbar.thumbY, scrollbar.width - 4, 3);
      ctx.fillRect(x + 2, y + scrollbar.thumbY + scrollbar.thumbHeight - 3, scrollbar.width - 4, 3);
    }
  }

  btnBack.addEventListener('click', () => goToFrame(currentFrame - 1));
  btnForward.addEventListener('click', () => goToFrame(currentFrame + 1));

  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    goToFrame(currentFrame + (e.deltaY > 0 ? 1 : -1));
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case 'ArrowLeft':
      case 'ArrowUp': e.preventDefault(); goToFrame(currentFrame - 1); break;
      case 'ArrowRight':
      case 'ArrowDown': e.preventDefault(); goToFrame(currentFrame + 1); break;
      case 'm':
      case 'M': e.preventDefault(); toggleMenu(); break;
    }
  }, { signal });

  canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    const videoWidth = canvas.width - scrollbar.width - scrollbar.padding * 2;
    const scrollbarX = videoWidth + scrollbar.padding;
    const scrollbarY = scrollbar.padding;
    const scrollbarHeight = canvas.height - scrollbar.padding * 2;
    if (mouseX >= scrollbarX && mouseX <= scrollbarX + scrollbar.width &&
        mouseY >= scrollbarY && mouseY <= scrollbarY + scrollbarHeight) {
      const thumbY = scrollbarY + scrollbar.thumbY;
      if (mouseY >= thumbY && mouseY <= thumbY + scrollbar.thumbHeight) {
        scrollbar.isDragging = true;
        scrollbar.startY = mouseY - scrollbar.thumbY;
        canvas.addEventListener('mousemove', onCanvasDrag);
        canvas.addEventListener('mouseup', stopDrag);
        canvas.addEventListener('mouseleave', stopDrag);
        drawFrame();
      } else {
        const usableHeight = scrollbarHeight - scrollbar.thumbHeight;
        const clickRatio = (mouseY - scrollbarY) / scrollbarHeight;
        const targetFrame = Math.floor(clickRatio * totalFrames);
        goToFrame(targetFrame);
      }
    }
  });

  function onCanvasDrag(e) {
    if (!scrollbar.isDragging) return;
    const rect = canvas.getBoundingClientRect();
    const scaleY = canvas.height / rect.height;
    const mouseY = (e.clientY - rect.top) * scaleY;
    const scrollbarY = scrollbar.padding;
    const scrollbarHeight = canvas.height - scrollbar.padding * 2;
    const usableHeight = scrollbarHeight - scrollbar.thumbHeight;
    let newY = mouseY - scrollbar.startY - scrollbarY;
    newY = Math.max(0, Math.min(newY, usableHeight));
    const ratio = newY / usableHeight;
    const targetFrame = Math.floor(ratio * (totalFrames - 1));
    goToFrame(targetFrame);
  }

  function stopDrag() {
    scrollbar.isDragging = false;
    canvas.removeEventListener('mousemove', onCanvasDrag);
    canvas.removeEventListener('mouseup', stopDrag);
    canvas.removeEventListener('mouseleave', stopDrag);
    drawFrame();
  }

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    const videoWidth = canvas.width - scrollbar.width - scrollbar.padding * 2;
    const scrollbarX = videoWidth + scrollbar.padding;
    const scrollbarY = scrollbar.padding;
    const scrollbarHeight = canvas.height - scrollbar.padding * 2;
    const wasHover = scrollbar.hover;
    scrollbar.hover = (mouseX >= scrollbarX && mouseX <= scrollbarX + scrollbar.width &&
                       mouseY >= scrollbarY && mouseY <= scrollbarY + scrollbarHeight);
    if (wasHover !== scrollbar.hover && !scrollbar.isDragging) {
      drawFrame();
    }
  });

  menuButton.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMenu();
  });

  document.addEventListener('click', (e) => {
    const insideContainer = e.composedPath().some(
      el => el instanceof Element && el.classList && el.classList.contains('canvas-container')
    );
    if (!insideContainer) closeMenu();
  }, { signal });

  video.addEventListener('error', (e) => {
    console.error('Ошибка загрузки видео:', e);
    alert('Не удалось загрузить видео. Проверьте путь к файлу.');
  });
})();
</script>
</body>
</html>
